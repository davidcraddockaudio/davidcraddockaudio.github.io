baseURL: "https://davidcraddockaudio.github.io"
title: DavidCraddockAudio.com
copyright: "© David Paul Craddock"
paginate: 5
theme: PaperMod-dpc

enableInlineShortcodes: true
enableRobotsTXT: true
buildDrafts: true
buildFuture: true
buildExpired: true
enableEmoji: true
pygmentsUseClasses: true
mainsections: ["posts", "papermod"]

frontmatter:
  date:
  - date
  - :git
  - :fileModTime

minify:
  disableXML: true
  minifyOutput: true

languages:
  en:
    languageName: "English"
    weight: 1
    taxonomies:
      category: categories
      tag: tags
      series: series
    menu:
      main:
        - name: Search
          url: search/
          weight: 10
        - name: DJing
          url: DJing/
          weight: 11
        - name: Production
          url: Production/
          weight: 12
        - name: Education
          url: Education/
          weight: 13
        - name: Engineering
          url: Engineering/
          weight: 14
        - name: More
          url: https://davidcraddock.net
          weight: 15

outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  env: production # to enable google analytics, opengraph, twitter-cards and schema.
  description: "DavidCraddockAudio.com"
  author: David Craddock
  defaultTheme: auto
  # disableThemeToggle: true
  ShowShareButtons: true
  ShowReadingTime: true
  # disableSpecial1stPost: true
  displayFullLangName: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowRssButtonInSectionTermList: true
  ShowAllPagesInArchive: true
  ShowPageNums: true
  ShowToc: true
  TocOpen: true # open contents automantically
  comments: true
  images: ["/mugshot.png"]
  social:
    github: wordswords
    instagram: djdavidcraddock


  profileMode:
    enabled: false

    buttons:
      - name: Archives
        url: archives
      - name: Tags
        url: tags

  homeInfoParams:
    Title: "Music and Audio Portfolio"
    Content: >
      👋 This is a portfolio and record of the work I have undertaken in the audio and music industry.

      I have been a professional [DJ for 15+ years](/DJing), a [Music Producer for 10+](/Production) and an [Engineer](/Engineering) and a [life-long learner of music](/Education) all my professional life.
      <br/>
      <br/>
      <img loading="lazy" style="object-fit:contain;max-width:100%;max-height:100%;width:127px;height:127px;" src="/mugshot.png" alt="A picture of a happy audience at a DJ gig">
      <br/>
      <a href="mailto:3rp2mzocr@mozmail.com">Email me here.</a>
      <br/>

assets:
  disableHLJS: true
  disableFingerprinting: true

markup:
  goldmark:
    backend: html5
    failureLevel: fatal
    noHeaderOrFooter: true
    preserveTOC: true
    sectionNumbers: false
    trace: false
    verbose: false
    workingFolderCurrent: false
    renderer:
      hardWraps: false
      unsafe: true
      xhtml: false

highlight:
  noClasses: false
  anchorLineNos: false
  codeFences: true
  guessSyntax: true
  lineNos: true
  style: monokai

services:
  instagram:
    disableInlineCSS: true
  x:
    disableInlineCSS: true
  disqus:
    shortname: davidcraddocknet

